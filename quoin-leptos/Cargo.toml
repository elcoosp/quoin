[package]
name = "quoin-leptos"
version = "0.1.0"
edition = "2021"
description = "Leptos adapter for quoin reactive abstraction"
license = "MIT OR Apache-2.0"
repository = "https://github.com/username/quoin"

[dependencies]
quoin = { path = "../quoin", default-features = false, features = ["leptos"] }

futures = { version = "0.3", features = ["executor"] }
leptos = { version = "0.8" }
send_wrapper = "0.6"
any_spawner = { version = "0.3", features = ["futures-executor"] }
[dev-dependencies]
quoin-conformance = { path = "../quoin-conformance", features = ["leptos"] }

tested-trait = "0.1"
