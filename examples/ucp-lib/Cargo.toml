[package]
name = "ucp-lib"
version = "0.1.0"
edition = "2021"

[dependencies]
quoin = { path = "../../quoin" }
quoin-macros = { path = "../../quoin-macros" }
quoin-ui = { path = "../../quoin-ui" }

# Framework-specific dependencies (optional)
quoin-gpui = { path = "../../quoin-gpui", optional = true }
gpui = { git = "https://github.com/zed-industries/zed", optional = true }
quoin-ui-gpui = { path = "../../quoin-ui-gpui", optional = true }

quoin-leptos = { path = "../../quoin-leptos", optional = true }
leptos = { version = "0.8", optional = true }

quoin-dioxus = { path = "../../quoin-dioxus", optional = true }
dioxus = { version = "0.7", optional = true }

[features]
gpui = ["dep:quoin-gpui", "dep:gpui", "dep:quoin-ui-gpui", "quoin/gpui", "quoin-macros/gpui"]
leptos = ["dep:quoin-leptos", "dep:leptos", "quoin/leptos", "quoin-macros/leptos"]
dioxus = ["dep:quoin-dioxus", "dep:dioxus", "quoin/dioxus", "quoin-macros/dioxus"]
